<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园食堂消费行为分析系统</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body data-page="{% block page_id %}index{% endblock %}">

    <header class="header shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4 py-3">
            <div class="logo fs-4 fw-bold text-primary">
                <i class="fas fa-chart-pie me-2"></i> 校园食堂消费行为分析系统
            </div>

            <div class="header-right d-flex align-items-center gap-3">
                {% if session.get('user_id') %}
                    <div class="user-badge bg-light px-3 py-1 rounded-pill border">
                        <i class="fas fa-user-circle text-secondary me-1"></i>
                        <b class="text-dark">{{ session.get('username') }}</b>
                        <span class="user-role text-muted small ms-1">({{ session.get('role') }})</span>
                    </div>
                    <a href="{{ url_for('main.logout') }}" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </a>
                {% else %}
                    <a href="{{ url_for('main.login') }}" class="btn btn-primary btn-sm rounded-pill px-4">
                        <i class="fas fa-sign-in-alt"></i> 登录系统
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <div class="layout-wrapper container-fluid d-flex mt-3">

        <aside class="sidebar p-3 bg-white rounded shadow-sm" style="width: 250px; min-height: 80vh;">
            <div class="sidebar-title text-muted small fw-bold px-3 mb-3 text-uppercase letter-spacing-1">分析模块</div>
            <nav class="nav flex-column gap-1">
                <a href="{{ url_for('main.index') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.index' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-th-large fa-fw me-2"></i> 首页概览
                </a>
                <a href="{{ url_for('main.consumption_trend') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.consumption_trend' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-chart-line fa-fw me-2"></i> 消费趋势
                </a>
                <a href="{{ url_for('main.dish_hot') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.dish_hot' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-fire fa-fw me-2 text-danger"></i> 热销菜品
                </a>
                <a href="{{ url_for('main.dish_analysis') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.dish_analysis' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-project-diagram fa-fw me-2"></i> 关联分析
                </a>
                <a href="{{ url_for('main.forecast') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.forecast' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-magic fa-fw me-2" style="color: #6f42c1;"></i> 销量预测
                </a>
                <a href="{{ url_for('main.user_portrait') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.user_portrait' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-id-card fa-fw me-2"></i> 用户画像
                </a>
                <a href="{{ url_for('main.records') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.records' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-file-invoice-dollar fa-fw me-2"></i> 消费记录
                </a>
                <a href="{{ url_for('main.reports') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.reports' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-chart-bar fa-fw me-2"></i> 数据报表
                </a>

                <hr class="my-2">

                <div class="sidebar-title text-muted small fw-bold px-3 mb-2 text-uppercase letter-spacing-1">智能应用</div>
                <a href="{{ url_for('main.recommend') }}" class="nav-link text-dark rounded px-3 py-2 {% if request.endpoint == 'main.recommend' %}active bg-primary text-white{% endif %}">
                    <i class="fas fa-star fa-fw me-2 text-warning"></i> 猜你喜欢
                </a>
            </nav>
        </aside>

        <main class="main-content flex-grow-1 ms-4">
            {% block content %}{% endblock %}
        </main>

    </div>

    <footer class="footer mt-5 py-3 border-top">
        <div class="container text-center text-muted small">
            <p class="mb-0">© 2026 校园食堂消费行为分析系统 | 毕业设计项目</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
