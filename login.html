<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园智慧餐饮分析系统 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }

        /* 外围高级深色渐变背景 */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器：两列布局，增加细腻阴影 */
        .login-wrapper {
            display: flex;
            width: 900px;
            height: 600px;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), 0 0 40px rgba(79, 70, 229, 0.1);
        }

        /* ================= 左侧：几何插画区 ================= */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); /* 柔和的微蓝底色 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 80px;
            border-right: 1px solid #f1f5f9;
        }

        /* 用 CSS 纯代码绘制抽象几何插画 (颜色优化为现代流行色) */
        .art-container {
            position: relative;
            width: 300px;
            height: 250px;
        }

        /* 靛蓝长条 */
        .shape-purple {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 90px;
            height: 220px;
            background: linear-gradient(180deg, #6366f1, #4f46e5);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 10px 20px rgba(79,70,229,0.2);
        }
        .shape-purple::after {
            content: ""; position: absolute; top: 30px; right: 20px; width: 6px; height: 12px; background: rgba(255,255,255,0.8); border-radius: 6px;
        }

        /* 深空灰长条 */
        .shape-black {
            position: absolute;
            bottom: 0;
            left: 100px;
            width: 70px;
            height: 150px;
            background: linear-gradient(180deg, #334155, #0f172a);
            border-radius: 12px 12px 0 0;
            z-index: 2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .shape-black::before, .shape-black::after {
            content: ""; position: absolute; top: 20px; width: 6px; height: 6px; background: #fff; border-radius: 50%;
        }
        .shape-black::before { left: 20px; }
        .shape-black::after { right: 20px; }

        /* 珊瑚橘怪兽 */
        .shape-orange {
            position: absolute;
            bottom: 0;
            left: -30px;
            width: 170px;
            height: 100px;
            background: linear-gradient(180deg, #fb923c, #f97316);
            border-radius: 100px 100px 0 0;
            z-index: 3;
            box-shadow: 0 10px 20px rgba(249,115,22,0.2);
        }
        .shape-orange::before, .shape-orange::after {
            content: ""; position: absolute; top: 40px; width: 8px; height: 8px; background: #fff; border-radius: 50%;
        }
        .shape-orange::before { left: 90px; }
        .shape-orange::after { left: 115px; }

        /* 亮黄色怪兽 */
        .shape-yellow {
            position: absolute;
            bottom: 0;
            right: 30px;
            width: 90px;
            height: 120px;
            background: linear-gradient(180deg, #fde047, #eab308);
            border-radius: 50px 40px 10px 40px;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(234,179,8,0.15);
        }
        .shape-yellow::before {
            content: ""; position: absolute; top: 30px; left: 30px; width: 6px; height: 6px; background: #1e293b; border-radius: 50%;
        }
        .shape-yellow::after {
            content: ""; position: absolute; top: 45px; right: -15px; width: 30px; height: 6px; background: #1e293b; border-radius: 6px;
        }

        /* ================= 右侧：表单登录区 ================= */
        .login-right {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
        }

        .top-logo {
            font-size: 28px;
            color: #4f46e5; /* 品牌主题色 */
            text-align: center;
            margin-bottom: 16px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-text h2 {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .header-text p {
            font-size: 13px;
            color: #64748b;
        }

        /* 角色切换胶囊优化 */
        .role-toggle {
            display: flex;
            background: #f1f5f9;
            border-radius: 999px;
            padding: 5px;
            margin-bottom: 28px;
        }

        .role-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn.active {
            background: #4f46e5; /* 主题色激活 */
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        /* 现代质感输入框 */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #0f172a;
            background: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); /* 焦点光环 */
        }

        /* 密码可见切换图标位置修正 */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 40px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #4f46e5;
        }

        /* 附加选项 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 12px;
            color: #64748b;
        }

        .form-options label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .form-options input[type="checkbox"] {
            margin-right: 8px;
            accent-color: #4f46e5;
            width: 14px;
            height: 14px;
        }

        .form-options a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .form-options a:hover { opacity: 0.8; }

        /* 主体操作按钮渐变与光影 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
        }

        /* Flask 错误提示美化 */
        .flash-messages {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            border: 1px solid #fee2e2;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #64748b;
        }

        .footer-text a {
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <div class="login-left">
            <div class="art-container">
                <div class="shape-purple"></div>
                <div class="shape-black"></div>
                <div class="shape-orange"></div>
                <div class="shape-yellow"></div>
            </div>
        </div>

        <div class="login-right">
            <div class="top-logo">
                <i class="fa-solid fa-chart-pie"></i>
            </div>

            <div class="header-text">
                <h2>Welcome Back</h2>
                <p>请输入您的账户信息进入系统</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                  {% for message in messages %}
                    <i class="fa-solid fa-circle-exclamation me-1"></i> {{ message }}
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('main.login') }}" method="POST">
                <input type="hidden" name="login_role" id="login_role" value="student">

                <div class="role-toggle">
                    <div class="role-btn active" id="tab-student" onclick="switchRole('student')">学生 / 教职工</div>
                    <div class="role-btn" id="tab-merchant" onclick="switchRole('merchant')">商家后台</div>
                </div>

                <div class="input-group">
                    <label>Account ID</label>
                    <input type="text" name="username" id="input-username" placeholder="请输入学号 / 工号" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" id="input-password" placeholder="请输入密码 (默认123456)" required>
                    <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility()"></i>
                </div>

                <div class="form-options">
                    <label><input type="checkbox" name="remember_me" value="true"> 保持登录状态</label>
                    <a onclick="handleForgotPwd()">忘记密码?</a>
                </div>

                <button type="submit" class="btn-submit">安全登录</button>
            </form>

            <div class="footer-text">
                首次使用系统? <a onclick="handleActivate()">联系管理员激活</a>
            </div>
        </div>

    </div>

    <script>
        // 1. 角色切换交互
        function switchRole(role) {
            document.getElementById('login_role').value = role;

            const tabStudent = document.getElementById('tab-student');
            const tabMerchant = document.getElementById('tab-merchant');
            const inputUsername = document.getElementById('input-username');
            const inputPassword = document.getElementById('input-password');

            if (role === 'student') {
                tabStudent.classList.add('active');
                tabMerchant.classList.remove('active');
                inputUsername.placeholder = "请输入学号 / 工号";
                inputPassword.placeholder = "请输入密码 (默认123456)";
            } else {
                tabMerchant.classList.add('active');
                tabStudent.classList.remove('active');
                inputUsername.placeholder = "请输入商家 / 管理员账号";
                inputPassword.placeholder = "请输入商家后台密码";
            }
        }

        // 2. 密码可见性切换
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('input-password');
            const icon = document.querySelector('.toggle-password');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // 3. 忘记密码交互 (使用 SweetAlert2 弹出优雅的提示框)
        function handleForgotPwd() {
            Swal.fire({
                icon: 'info',
                title: '重置密码说明',
                text: '为保障数据安全，请携带本人一卡通前往学校网络信息中心（行政楼301）办理密码重置。',
                confirmButtonColor: '#4f46e5',
                confirmButtonText: '我知道了'
            });
        }

        // 4. 联系管理员交互
        function handleActivate() {
            Swal.fire({
                icon: 'warning',
                title: '账号激活与注册',
                html: '<b>学生/教职工：</b>账号由学校系统自动同步，无需注册。<br><br><b>商家入驻：</b>请联系后勤管理处（内线: 8802）进行资质审核与账号开通。',
                confirmButtonColor: '#4f46e5',
                confirmButtonText: '明白'
            });
        }
    </script>
</body>
</html>
