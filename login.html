<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园智慧餐饮分析系统 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }

        /* 外围深色背景，衬托中间的白色卡片 */
        body {
            background-color: #1a1a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器：两列布局 */
        .login-wrapper {
            display: flex;
            width: 900px;
            height: 600px;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ================= 左侧：几何插画区 ================= */
        .login-left {
            flex: 1;
            background-color: #f3f4f6; /* 浅灰背景 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 让图形沉底 */
            padding-bottom: 80px;
        }

        /* 用 CSS 纯代码绘制图片中的抽象几何小怪兽 */
        .art-container {
            position: relative;
            width: 300px;
            height: 250px;
        }

        /* 紫色长条 */
        .shape-purple {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 90px;
            height: 220px;
            background-color: #6b46c1;
            border-radius: 12px 12px 0 0;
        }
        .shape-purple::after {
            content: ""; position: absolute; top: 30px; right: 20px; width: 6px; height: 12px; background: #111; border-radius: 6px;
        }

        /* 黑色长条 */
        .shape-black {
            position: absolute;
            bottom: 0;
            left: 100px;
            width: 70px;
            height: 150px;
            background-color: #1f2937;
            border-radius: 8px 8px 0 0;
            z-index: 2;
        }
        .shape-black::before, .shape-black::after {
            content: ""; position: absolute; top: 20px; width: 6px; height: 6px; background: #fff; border-radius: 50%;
        }
        .shape-black::before { left: 20px; }
        .shape-black::after { right: 20px; }

        /* 橘色半圆怪兽 */
        .shape-orange {
            position: absolute;
            bottom: 0;
            left: -30px;
            width: 170px;
            height: 100px;
            background-color: #f97316;
            border-radius: 100px 100px 0 0;
            z-index: 3;
        }
        .shape-orange::before, .shape-orange::after {
            content: ""; position: absolute; top: 40px; width: 8px; height: 8px; background: #111; border-radius: 50%;
        }
        .shape-orange::before { left: 90px; }
        .shape-orange::after { left: 115px; }

        /* 黄色异形怪兽 */
        .shape-yellow {
            position: absolute;
            bottom: 0;
            right: 30px;
            width: 90px;
            height: 120px;
            background-color: #eab308;
            border-radius: 50px 40px 10px 40px;
            z-index: 1;
        }
        .shape-yellow::before {
            content: ""; position: absolute; top: 30px; left: 30px; width: 6px; height: 6px; background: #111; border-radius: 50%;
        }
        /* 黄色怪兽的嘴巴/横线 */
        .shape-yellow::after {
            content: ""; position: absolute; top: 45px; right: -15px; width: 30px; height: 6px; background: #111; border-radius: 6px;
        }

        /* ================= 右侧：表单登录区 ================= */
        .login-right {
            flex: 1;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }

        /* 顶部四角星 Logo */
        .top-logo {
            font-size: 24px;
            color: #000;
            text-align: center;
            margin-bottom: 20px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-text h2 {
            font-size: 28px;
            font-weight: 700;
            color: #111;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 13px;
            color: #6b7280;
        }

        /* 角色切换胶囊 (平替了原版的Google按钮位置，更符合业务逻辑) */
        .role-toggle {
            display: flex;
            background: #f3f4f6;
            border-radius: 999px;
            padding: 4px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .role-btn.active {
            background: #ffffff;
            color: #111;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 极简下划线输入框 */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0;
            border: none;
            border-bottom: 1.5px solid #d1d5db;
            font-size: 15px;
            color: #111;
            outline: none;
            background: transparent;
            transition: border-color 0.3s;
        }

        .input-group input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .input-group input:focus {
            border-bottom-color: #111;
        }

        /* 密码可见切换图标 */
        .toggle-password {
            position: absolute;
            right: 0;
            bottom: 10px;
            color: #9ca3af;
            cursor: pointer;
        }

        /* 附加选项 (记住密码/忘记密码) */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 12px;
            color: #6b7280;
        }

        .form-options label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .form-options input[type="checkbox"] {
            margin-right: 8px;
            accent-color: #111;
        }

        .form-options a {
            color: #111;
            text-decoration: none;
            font-weight: 500;
        }

        /* 主黑胶囊按钮 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #374151;
        }

        /* Flask 错误提示 */
        .flash-messages {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* 底部注册提示 */
        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #6b7280;
        }

        .footer-text a {
            color: #111;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <div class="login-left">
            <div class="art-container">
                <div class="shape-purple"></div>
                <div class="shape-black"></div>
                <div class="shape-orange"></div>
                <div class="shape-yellow"></div>
            </div>
        </div>

        <div class="login-right">
            <div class="top-logo">
                <i class="fa-solid fa-sparkles"></i>
            </div>

            <div class="header-text">
                <h2>Welcome back!</h2>
                <p>请输入您的账户信息进入系统</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                  {% for message in messages %}
                    {{ message }}
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('main.login') }}" method="POST">
                <input type="hidden" name="login_role" id="login_role" value="student">

                <div class="role-toggle">
                    <div class="role-btn active" id="tab-student" onclick="switchRole('student')">学生 / 教职工</div>
                    <div class="role-btn" id="tab-merchant" onclick="switchRole('merchant')">商家后台</div>
                </div>

                <div class="input-group">
                    <label>Account</label>
                    <input type="text" name="username" id="input-username" placeholder="请输入学号/工号" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" id="input-password" placeholder="请输入密码" required>
                    <i class="fa-regular fa-eye toggle-password"></i>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember for 30 days</label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <div class="footer-text">
                Don't have an account? <a href="#">Sign Up</a>
            </div>
        </div>

    </div>

    <script>
        // 角色切换逻辑
        function switchRole(role) {
            document.getElementById('login_role').value = role;

            const tabStudent = document.getElementById('tab-student');
            const tabMerchant = document.getElementById('tab-merchant');
            const inputUsername = document.getElementById('input-username');

            if (role === 'student') {
                tabStudent.classList.add('active');
                tabMerchant.classList.remove('active');
                inputUsername.placeholder = "请输入学号/工号";
            } else {
                tabMerchant.classList.add('active');
                tabStudent.classList.remove('active');
                inputUsername.placeholder = "请输入商家/管理员账号";
            }
        }
    </script>
</body>
</html>
