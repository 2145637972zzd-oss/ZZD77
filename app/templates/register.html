<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生注册 - 校园食堂消费分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { width: 100%; max-width: 450px; padding: 2rem; border-radius: 15px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .register-title { font-weight: bold; color: #333; text-align: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="register-card">
        <h3 class="register-title">🎓 学生账号注册</h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">学号 (将作为登录名)</label>
                <input type="text" name="username" class="form-control" required placeholder="如：2026001">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">真实姓名</label>
                <input type="text" name="real_name" class="form-control" required placeholder="请输入姓名">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">设置密码</label>
                <input type="password" name="password" class="form-control" required placeholder="请设置不少于6位的密码">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold mb-3">确认注册</button>
            <div class="text-center">
                <span class="text-muted small">已有账号？</span>
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold text-secondary">返回登录</a>
            </div>
        </form>
    </div>
</body>
</html>
