{% extends "base.html" %}
{% block page_id %}change-password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-header bg-white pt-4 pb-2 border-bottom-0">
                <h5 class="fw-bold text-dark"><i class="fas fa-key text-warning me-2"></i>修改登录密码</h5>
            </div>
            
            <div class="card-body">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger py-2">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('auth.change_password') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small">当前密码</label>
                        <input type="password" name="old_password" class="form-control bg-light border-0" required placeholder="请输入原密码进行身份验证">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small">新密码</label>
                        <input type="password" name="new_password" class="form-control bg-light border-0" required placeholder="请输入新的不少于6位的密码">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary fw-bold" style="border-radius: 8px;">保存新密码并重新登录</button>
                        <a href="{{ url_for('analysis.index') }}" class="btn btn-light text-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
