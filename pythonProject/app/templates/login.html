<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园食堂消费分析系统 - 登录与注册</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Microsoft YaHei', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* 防止出现滚动条 */
        }

        /* 粒子背景容器 */
        #particles-js {
            position: absolute; width: 100%; height: 100%; z-index: 1;
        }

        /* 登录框主体提升层级，并加入一点玻璃拟态效果 */
        .login-wrapper {
            position: relative; z-index: 10;
            display: flex; width: 950px; min-height: 620px; background: rgba(255, 255, 255, 0.98);
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(79, 70, 229, 0.2);
            backdrop-filter: blur(10px);
        }

        .login-left {
            flex: 1; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid #f1f5f9; padding: 40px;
        }
        /* 去除了副标题，直接调整主标题的底部间距，保持居中排版 */
        .brand-name { font-size: 26px; font-weight: 700; color: #4f46e5; margin-bottom: 50px; text-align: center; letter-spacing: 1px; }

        .art-container { position: relative; width: 250px; height: 220px; }
        .shape-purple { position: absolute; bottom: 0; left: 10px; width: 80px; height: 190px; background: linear-gradient(180deg, #6366f1, #4f46e5); border-radius: 16px 16px 0 0; box-shadow: 0 10px 20px rgba(79,70,229,0.2); transition: height 0.5s; }
        .shape-black { position: absolute; bottom: 0; left: 80px; width: 60px; height: 130px; background: linear-gradient(180deg, #334155, #0f172a); border-radius: 12px 12px 0 0; z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: height 0.6s; }
        .shape-orange { position: absolute; bottom: 0; left: -20px; width: 140px; height: 80px; background: linear-gradient(180deg, #fb923c, #f97316); border-radius: 100px 100px 0 0; z-index: 3; box-shadow: 0 10px 20px rgba(249,115,22,0.2); transition: height 0.7s; }
        .shape-yellow { position: absolute; bottom: 0; right: 20px; width: 80px; height: 100px; background: linear-gradient(180deg, #fde047, #eab308); border-radius: 40px 30px 10px 30px; z-index: 1; box-shadow: 0 10px 20px rgba(234,179,8,0.15); }
        .login-wrapper:hover .shape-purple { height: 210px; }
        .login-wrapper:hover .shape-black { height: 150px; }

        .login-right { flex: 1.1; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; background: transparent; }

        .header-text { text-align: center; margin-bottom: 25px; }
        .header-text h2 { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
        .header-text p { font-size: 13px; color: #64748b; }

        .role-toggle { display: flex; background: #f1f5f9; border-radius: 999px; padding: 5px; margin-bottom: 20px; }
        .role-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 600; color: #64748b; border-radius: 999px; cursor: pointer; transition: all 0.3s ease; }
        .role-btn.active { background: #4f46e5; color: #ffffff; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }

        .input-group { margin-bottom: 16px; position: relative; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; color: #0f172a; background: #f8fafc; outline: none; transition: all 0.2s ease; }
        .input-group input:focus { border-color: #4f46e5; background: #ffffff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .toggle-password { position: absolute; right: 16px; top: 38px; color: #94a3b8; cursor: pointer; transition: color 0.2s; }
        .toggle-password:hover { color: #4f46e5; }

        /* 验证码区域样式 */
        .captcha-container { display: flex; gap: 10px; align-items: center; }
        .captcha-container input { flex: 1; }
        #captchaCanvas { cursor: pointer; border-radius: 8px; border: 1px solid #e2e8f0; }

        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); color: #ffffff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); transition: all 0.3s ease; margin-top: 5px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35); }

        .flash-messages { background-color: #fef2f2; color: #ef4444; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; font-weight: 500; border: 1px solid #fee2e2; }
        .switch-mode { text-align: center; margin-top: 15px; font-size: 13px; color: #64748b; }
        .switch-mode span { color: #4f46e5; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .switch-mode span:hover { opacity: 0.8; text-decoration: underline; }

        /* 隐藏注册表单 */
        #register-form-container { display: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="login-wrapper">
        <div class="login-left">
            <div class="brand-name"><i class="fa-solid fa-chart-pie me-2"></i> 食堂消费分析系统</div>

            <div class="art-container">
                <div class="shape-purple"></div>
                <div class="shape-black"></div>
                <div class="shape-orange"></div>
                <div class="shape-yellow"></div>
            </div>
        </div>

        <div class="login-right">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                  {% for message in messages %}
                    <i class="fa-solid fa-circle-exclamation me-1"></i> {{ message }}<br>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <div id="login-form-container">
                <div class="header-text">
                    <h2>欢迎登录系统</h2>
                    <p>请输入您的系统账户信息</p>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST" onsubmit="return validateLogin()">
                    <input type="hidden" name="login_role" id="login_role" value="student">

                    <div class="role-toggle">
                        <div class="role-btn active" id="login-tab-student" onclick="switchLoginRole('student')">学生/教职工</div>
                        <div class="role-btn" id="login-tab-merchant" onclick="switchLoginRole('merchant')">系统管理端</div>
                    </div>

                    <div class="input-group">
                        <label>登录账号</label>
                        <input type="text" name="username" id="login-username" placeholder="请输入学号 / 工号" required>
                    </div>

                    <div class="input-group">
                        <label>密码</label>
                        <input type="password" name="password" id="login-password" placeholder="初始默认密码为 123456" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('login-password', this)"></i>
                    </div>

                    <div class="input-group">
                        <label>安全验证</label>
                        <div class="captcha-container">
                            <input type="text" id="captcha-input" placeholder="请输入右侧字母" required autocomplete="off">
                            <canvas id="captchaCanvas" width="110" height="46" onclick="drawCaptcha()" title="点击刷新"></canvas>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center" style="margin-bottom: 20px; font-size: 12px; color: #64748b;">
                        <label style="cursor: pointer;"><input type="checkbox" name="remember_me" value="true" style="margin-right: 5px; accent-color: #4f46e5;"> 保持登录</label>
                        <span style="color: #4f46e5; cursor: pointer;" onclick="handleForgotPwd()">忘记密码?</span>
                    </div>

                    <button type="submit" class="btn-submit">安全登录</button>
                </form>

                <div class="switch-mode">
                    还没有账号? <span onclick="toggleView('register')">免费注册入驻</span>
                </div>
            </div>

            <div id="register-form-container">
                <div class="header-text">
                    <h2>新用户注册</h2>
                    <p>录入基础信息以使用系统功能</p>
                </div>

                <form action="{{ url_for('auth.register') }}" method="POST" onsubmit="return validateRegister()">
                    <input type="hidden" name="reg_role" id="reg_role" value="student">

                    <div class="role-toggle">
                        <div class="role-btn active" id="reg-tab-student" onclick="switchRegRole('student')">学生端账号</div>
                        <div class="role-btn" id="reg-tab-merchant" onclick="switchRegRole('merchant')">管理端账号</div>
                    </div>

                    <div id="reg-student-fields">
                        <div class="input-group">
                            <label>学号 / 工号</label>
                            <input type="text" name="user_id" placeholder="请输入您的学号">
                        </div>
                        <div class="input-group">
                            <label>真实姓名</label>
                            <input type="text" name="name" placeholder="请输入您的姓名">
                        </div>
                        <div style="font-size: 12px; color: #10b981; margin-bottom: 15px; text-align: center; background: #d1fae5; padding: 8px; border-radius: 8px;">
                            <i class="fa-solid fa-circle-info"></i> 学生初始密码默认为 <b>123456</b>
                        </div>
                    </div>

                    <div id="reg-merchant-fields" style="display: none;">
                        <div class="input-group">
                            <label>管理账号</label>
                            <input type="text" name="username" placeholder="请设置登录账号 (如: canteen_01)">
                        </div>
                        <div class="input-group">
                            <label>登录密码</label>
                            <input type="password" name="password" id="reg-password" placeholder="请设置高强度密码">
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('reg-password', this)"></i>
                        </div>
                        <div class="input-group">
                            <label>后台名称 (选填)</label>
                            <input type="text" name="real_name" placeholder="如: 档口负责人">
                        </div>
                    </div>

                    <div style="font-size: 12px; color: #64748b; margin-bottom: 15px;">
                        <label style="cursor: pointer; display: flex; align-items: flex-start; gap: 8px;">
                            <input type="checkbox" id="agreement" required style="margin-top: 3px; accent-color: #10b981;">
                            <span>我已阅读并同意系统的 <a href="#" style="color:#10b981; text-decoration:none;">《用户服务协议》</a> 及 <a href="#" style="color:#10b981; text-decoration:none;">《隐私保护政策》</a>，允许系统在脱敏前提下分析我的消费数据。</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">确认并注册</button>
                </form>

                <div class="switch-mode">
                    已有账号? <span onclick="toggleView('login')">返回安全登录</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ================= 1. 科技粒子背景配置 =================
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#6366f1" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#818cf8", "opacity": 0.3, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
            },
            "retina_detect": true
        });

        // ================= 2. 纯前端动态图形验证码 =================
        let currentCaptcha = "";
        function drawCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 随机生成 4 位字母数字
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            currentCaptcha = '';
            for (let i = 0; i < 4; i++) { currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length)); }

            // 绘制背景色
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制文字
            ctx.font = 'bold 24px Poppins';
            ctx.fillStyle = '#4f46e5';
            ctx.textBaseline = 'middle';
            // 添加字符微调和倾斜
            for(let i=0; i<4; i++) {
                ctx.save();
                ctx.translate(20 * i + 15, 23);
                ctx.rotate((Math.random() - 0.5) * 0.4);
                ctx.fillText(currentCaptcha[i], 0, 0);
                ctx.restore();
            }

            // 添加干扰线
            for (let i = 0; i < 4; i++) {
                ctx.strokeStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, 0.5)`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }
            // 添加干扰噪点
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, 0.6)`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        // 页面加载时生成验证码
        window.onload = drawCaptcha;

        // 登录前校验验证码 (已移除 admin 绕过后门，强制所有账号校验)
        function validateLogin() {
            const input = document.getElementById('captcha-input').value;

            // 严格比对验证码（忽略大小写）
            if (input.toLowerCase() !== currentCaptcha.toLowerCase()) {
                Swal.fire({
                    icon: 'error',
                    title: '验证码错误',
                    text: '请输入正确的验证码！',
                    confirmButtonColor: '#4f46e5'
                });
                // 刷新验证码并清空输入框
                drawCaptcha();
                document.getElementById('captcha-input').value = '';
                // 拦截表单提交，禁止跳转登录
                return false;
            }
            // 验证码正确，允许提交表单
            return true;
        }

        // ================= 3. 基础界面交互逻辑 =================
        function toggleView(view) {
            if (view === 'register') {
                document.getElementById('login-form-container').style.display = 'none';
                document.getElementById('register-form-container').style.display = 'block';
            } else {
                document.getElementById('register-form-container').style.display = 'none';
                document.getElementById('login-form-container').style.display = 'block';
            }
        }

        function switchLoginRole(role) {
            document.getElementById('login_role').value = role;
            if (role === 'student') {
                document.getElementById('login-tab-student').classList.add('active');
                document.getElementById('login-tab-merchant').classList.remove('active');
                document.getElementById('login-username').placeholder = "请输入学号 / 工号";
                document.getElementById('login-password').placeholder = "初始默认密码为 123456";
            } else {
                document.getElementById('login-tab-merchant').classList.add('active');
                document.getElementById('login-tab-student').classList.remove('active');
                document.getElementById('login-username').placeholder = "请输入管理员 / 商家账号";
                document.getElementById('login-password').placeholder = "请输入后台管理密码";
            }
        }

        function switchRegRole(role) {
            document.getElementById('reg_role').value = role;
            if (role === 'student') {
                document.getElementById('reg-tab-student').classList.add('active');
                document.getElementById('reg-tab-merchant').classList.remove('active');
                document.getElementById('reg-student-fields').style.display = 'block';
                document.getElementById('reg-merchant-fields').style.display = 'none';
            } else {
                document.getElementById('reg-tab-merchant').classList.add('active');
                document.getElementById('reg-tab-student').classList.remove('active');
                document.getElementById('reg-merchant-fields').style.display = 'block';
                document.getElementById('reg-student-fields').style.display = 'none';
            }
        }

        function togglePassword(inputId, iconElement) {
            const pwdInput = document.getElementById(inputId);
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }

        function handleForgotPwd() {
            Swal.fire({
                icon: 'info',
                title: '重置密码说明',
                text: '为保障数据安全，学生请联系辅导员；管理员请联系网络信息中心进行密码重置。',
                confirmButtonColor: '#4f46e5',
                confirmButtonText: '我知道了'
            });
        }
    </script>
</body>
</html>
